name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore BulkDDSConverter.csproj

    - name: Publish
      run: dotnet publish BulkDDSConverter.csproj -c Release -r win-x64 --self-contained true -o publish

    - name: Install Inno Setup
      run: choco install innosetup -y

    - name: Build Installer
      run: |
        iscc installer.iss

    - name: Zip Build
      run: |
        powershell Compress-Archive -Path publish\* -DestinationPath BulkDDSConverter.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Bulk DDS Converter ${{ github.ref_name }}
        body: |
          ## ⚡ Bulk DDS Converter

          A high-performance GPU-accelerated texture conversion tool built for batch processing.

          ### ✨ Features
          - GPU-accelerated DDS compression
          - Supports BC1, BC3, BC5, BC7 formats
          - Batch folder processing
          - Real-time progress tracking
          - Clean, modern UI

          ### 📥 Download
          Download the installer below and run to install the application.

          ---
          Built with a high-performance pipeline and optimized for speed.
        files: dist/BulkDDSConverter_Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}